# ── Server ──────────────────────────────────────────────────────────────────
# Transaction Ingestion Service runs on port 8082
server.port=8082
spring.application.name=transaction-ingestion-service

# ── PostgreSQL ───────────────────────────────────────────────────────────────
# Connects to the PostgreSQL container defined in docker-compose.yml
# The database "riskflow" will be created automatically by Hibernate on first run
spring.datasource.url=jdbc:postgresql://localhost:5432/riskflow
spring.datasource.username=postgres
spring.datasource.password=secret
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ──────────────────────────────────────────────────────────
# update: Hibernate will create or alter tables to match your entities automatically
# Use "create-drop" during early development if you want a clean slate on every restart
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ── Kafka Producer ───────────────────────────────────────────────────────────
# Points to the Kafka broker running in Docker
spring.kafka.bootstrap-servers=localhost:9092

# StringSerializer: we're sending plain String keys and values for now
# In Phase 6 (Tier 2) this will be replaced with Avro serializers
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# acks=all: Kafka will wait for all in-sync replicas to acknowledge the message
# This is the safest durability setting — no message is considered sent until
# at least one broker has confirmed it. Important for a financial transaction system.
spring.kafka.producer.acks=all

# Rate limiting configuration
# Max requests per client per window
rate.limit.requests=100
# Window size in seconds
rate.limit.window.seconds=60

spring.data.redis.host=localhost
spring.data.redis.port=6379