server.port=8083
spring.application.name=risk-scoring-service

spring.datasource.url=jdbc:postgresql://localhost:5432/riskflow
spring.datasource.username=postgres
spring.datasource.password=secret
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=risk-scoring-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

logging.level.root=INFO
logging.level.com.riskflow.scoring=DEBUG

# =============================================================================
# Phase 10 — Resilience4j Configuration
# Append these lines to your existing application.properties
# =============================================================================

# --- Circuit Breaker: ip-reputation ---
#
# slidingWindowSize=10
#   Track the last 10 calls to determine failure rate.
#   A small window makes the circuit breaker react quickly in demos.
#
# failureRateThreshold=50
#   If 50% or more of the last 10 calls fail, open the circuit.
#   With window=10, that means 5 failures trips the breaker.
#
# waitDurationInOpenState=10s
#   After the circuit opens, wait 10 seconds before trying again.
#   During this window all calls fail immediately with the fallback.
#   In production this would be 30-60 seconds.
#
# permittedNumberOfCallsInHalfOpenState=3
#   When the 10s cooldown expires, allow 3 test calls through.
#   If they succeed, close the circuit. If they fail, reopen it.
#
# automaticTransitionFromOpenToHalfOpenEnabled=true
#   Without this, the circuit stays OPEN forever until a call comes in.
#   With this, it automatically transitions to HALF_OPEN after the wait duration.

resilience4j.circuitbreaker.instances.ip-reputation.slidingWindowSize=10
resilience4j.circuitbreaker.instances.ip-reputation.failureRateThreshold=50
resilience4j.circuitbreaker.instances.ip-reputation.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.ip-reputation.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.ip-reputation.automaticTransitionFromOpenToHalfOpenEnabled=true

# --- Time Limiter: ip-reputation ---
#
# timeoutDuration=2s
#   If the external call takes longer than 2 seconds, cancel it.
#   The fallback is used instead. This prevents one slow external
#   service from stalling the Kafka consumer thread indefinitely.

resilience4j.timelimiter.instances.ip-reputation.timeoutDuration=2s

# --- Retry: ip-reputation ---
#
# maxAttempts=2
#   Try the call once, then retry once on failure before giving up.
#   Total attempts = 2 (1 original + 1 retry).
#   We keep this low because the time limiter already caps each attempt
#   at 2s — 3 retries × 2s = 6s stall per transaction is too long.
#
# waitDuration=200ms
#   Wait 200ms between attempts. Gives a transient blip time to recover.

resilience4j.retry.instances.ip-reputation.maxAttempts=2
resilience4j.retry.instances.ip-reputation.waitDuration=200ms