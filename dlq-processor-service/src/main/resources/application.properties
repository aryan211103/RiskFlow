# ── Server ──────────────────────────────────────────────────────────────────
server.port=8084
spring.application.name=dlq-processor-service

# ── PostgreSQL ───────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/riskflow
spring.datasource.username=postgres
spring.datasource.password=secret
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ──────────────────────────────────────────────────────────
# update: Hibernate creates or alters tables to match your entities on startup
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# ── Kafka Consumer ───────────────────────────────────────────────────────────
spring.kafka.bootstrap-servers=localhost:9092

# Each service needs a unique consumer group ID.
# Kafka uses this to track which messages this service has already processed.
spring.kafka.consumer.group-id=dlq-processor-service

# earliest: if this service starts fresh with no committed offset,
# read from the beginning of the topic rather than missing old messages
spring.kafka.consumer.auto-offset-reset=earliest

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer